server:
  port: 8080

spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/corebank}
    username: ${POSTGRES_USER:corebank}
    password: ${POSTGRES_PASSWORD:corebank}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

antifraud:
  enabled: true
  threshold: 10000.00